run_id_parameter:
  name: Run ID
  description: The ID of the run.
  cli: "-n"
  type: str
  constraints:
    - type: regex
      pattern: "\\w+"
      hint: Letters, numbers and underscores allowed.
common_directory_overwrite_parameter:
  name: Overwrite common output directory
  description: Are you sure you want to remove existing files?
  cli: "-frm"
  type: bool
  default: false
modes:
  - name: standard
    operations:
      first-op:
        name: First operation
        description: The first operation in the sequence.
        cli: -op 1
        input:
          - name: Input video
            cli: --mp4
            file:
              type: single
              formats:
                - .mp4
        output:
          file:
            type: directory
            contents:
              - type: single
                formats:
                  - .jpg
          path:
            - Operation1.
            - type: run id
        overwrite:
          path:
            - info
            - type: run id
          parameter:
            name: Overwrite output of operation 1?
            description: Overwrite!
            type: bool
            default: false

      second-op:
        name: Second operation
        description: The operation that comes after.
        cli: -op 2S
        input:
          - name: Frames
            cli: -f
            file:
              type: folder
              contents:
                - type: single
                  formats:
                    - .jpg
        output:
          file:
            type: single
            formats:
              - .txt
          path:
            - Operation2.
            - type: run id
        overwrite:
          path:
            - info
            - type: run id
          parameter:
            name: Overwrite output of operation 2?
            description: Overwrite!
            type: bool
            default: false
parameter_groups:
  - name: Boolean parameters
    operations:
      - first-op
      - second-op
    parameters:
      true-bool:
        name: True bool
        description: This boolean parameter is true by default.
        cli: --true-bool
        type: bool
        default: true
      false-bool:
        name: False bool
        description: A bool parameter that is false by default.
        cli: --false-bool
        type: bool
        default: false
  - name: Integer parameters
    operations:
      - first-op
      - second-op
    parameters:
      any-int-1:
        name: Unbounded int
        description: This integer can take any value.
        cli: --unbounded-int
        type: int
        default: 0
      any-int-2:
        name: Another unbounded int
        description: This time, the constraints are empty.
        cli: --int-unrestricted
        type: int
        default: 100
        constraints: []
      min-int-1:
        name: Lower-bounded int
        description: This integer must be at least 50.
        cli: -i50
        type: int
        default: 75
        constraints:
          - type: interval
            min: 50
      min-int-2:
        name: Another lower-bounded int
        description: Values 30+, upper bound is null.
        cli: -i30
        type: int
        min: 30
        max: null
        default: 1300
        constraints:
          - type: interval
            min: 30
            max: null
      max-int-1:
        name: Upper-bounded int
        description: This integer must be no more than 10.
        cli: -i10
        type: int
        default: -19
        constraints:
          - type: interval
            max: 10
      max-int-2:
        name: Another upper-bounded int
        description: No more than 15. Lower bound is null.
        cli: -i15
        type: int
        default: 15
        constraints:
          - type: interval
            min: null
            max: 15
      bounded-int-1:
        name: Bounded int
        description: This int is from 1 to 10.
        cli: -i1-10
        type: int
        default: 7
        constraints:
          - type: interval
            min: 1
            max: 10
  - name: Floating-point parameters
    operations:
      - first-op
      - second-op
    parameters:
      any-float-1:
        name: Unbounded float
        description: This float can take any value.
        cli: --unbounded-float
        type: float
        default: -3.14159
      any-float-2:
        name: Another unbounded float
        description: This time, the constraints are empty.
        cli: --float-unrestricted
        type: float
        default: 123.456
        constraints: []
      min-float-1:
        name: Lower-bounded float
        description: This float must be at least 1.5.
        cli: -f1.5
        type: float
        default: 1.9
        constraints:
          - type: interval
            min: 1.5
      min-float-2:
        name: Another lower-bounded float
        description: Values 3.1+, upper bound is null.
        cli: -f3.1
        type: float
        default: 1300
        constraints:
          - type: interval
            min: 3.1
            max: null
      max-float-1:
        name: Upper-bounded float
        description: This float must be no more than -190.45.
        cli: -f-190.45
        type: float
        default: -199
        constraints:
          - type: interval
            max: -190.45
      max-float-2:
        name: Another upper-bounded float
        description: No more than 13.13. Lower bound is null.
        cli: -f13.13
        type: float
        default: -23094.0
        constraints:
          - type: interval
            min: null
            max: 13.13
      bounded-float:
        name: Bounded float
        description: This float is between 0 and 1.
        cli: -f0-1
        type: float
        min: 0.0
        max: 1.0
        default: 0
        constraints:
          - type: interval
            min: 0.0
            max: 1.0
  - name: Enum parameters
    operations:
      - first-op
      - second-op
    parameters:
      cli-enum:
        name: Enum parameter
        description: Choose from a list of four values.
        cli: --enum
        type: enum
        options:
          - name: First option
            cli: one
          - name: Second option
            cli: two
          - name: Third option
            cli: three
          - name: Fourth option
            cli: four
        default: 2
      no-cli-enum:
        name: Dummy enum parameter
        description: This parameter will not be in the CLI.
        type: enum
        options:
            - name: Choose this...
            - name: ...or this!
            - name: Or even this.
  - name: String parameters
    operations:
      - first-op
      - second-op
    parameters:
      any-string:
        name: String
        description: Enter a string. Anything goes!
        cli: -s
        type: str
      max-len-str:
        name: Bounded string
        description: Type at most 4 characters.
        cli: --s-max4
        type: str
        constraints:
          - type: max length
            length: 4
      pattern-str:
        name: Pattern string
        description: This parameter must be only As and Bs.
        cli: --sAB
        type: str
        constraints:
          - type: regex
            pattern: (A|B)*
            hint: Any number of A or B.
      max-len-pattern-str:
        name: Bounded pattern string
        description: This parameter must be at most 10 digits.
        cli: --phone-number
        type: str
        constraints:
          - type: max length
            length: 10
          - type: regex
            pattern: '\\d*'
            hint: Only digits.
      default-str:
        name: Default value string
        description: This string already has a default value.
        cli: --default-str
        type: str
        default: Hello
        constraints:
          - type: max length
            length: 20
  - name: File parameters
    operations:
      - first-op
      - second-op
    parameters:
      any-file:
        name: Any file
        description: This allows one file of any type.
        cli: --any-file
        type: file
      any-files:
        name: Any files
        description: This allows many files of any type.
        cli: --any-files
        type: file
        multiple: true
      not-strict:
        name: Expected type file
        description: One file of any type, image expected.
        cli: --image
        type: file
        formats:
          - .png
          - .jpg
          - .jpeg
          - .gif
          - .webp
      not-strict-multiple:
        name: Expected type files
        description: Multiple files, videos expected.
        cli: --images
        type: file
        formats:
          - .mp4
          - .webm
        multiple: true
      strict:
        name: Specific type file
        description: One audio file.
        cli: --song
        type: file
        formats:
          - .mp3
          - .wav
        strict: true
      strict-multiple:
        name: Specific type files
        description: Multiple document files.
        cli: --docs
        type: file
        formats:
          - .doc
          - .docx
          - .odf
          - .pdf
        strict: true
        multiple: true
  - name: Optional parameters
    operations:
      - first-op
      - second-op
    parameters:
      opt-bool:
        name: Optional bool
        description: An optional bool parameter.
        type: optional
        parameter:
          name: Inner bool
          description: The inner parameter.
          cli: --opt-bool
          type: bool
          default: false
      opt-int:
        name: Optional int
        description: An optional int parameter, default true.
        type: optional
        default: true
        parameter:
          name: Inner int parameter
          description: null
          cli: --opt-int
          type: int
          default: 1
          constraints:
            - type: interval
              min: 1
      opt-float:
        name: Optional float
        description: An optional float parameter.
        type: optional
        default: false
        parameter:
          name: Inner float parameter
          type: float
          cli: --opt-float
          min: null
          max: null
          default: -1.1
      opt-enum:
        name: Optional enum
        description: An optional enum parameter.
        type: optional
        parameter:
          description: An inner enum parameter with no name.
          cli: --opt-enum
          type: enum
          options:
            - name: A
            - name: B
            - name: C
          default: 1
      opt-str:
        name: Optional string
        description: An optional string parameter.
        type: optional
        default: null
        parameter:
          name: null
          description: The string.
          cli: --opt-str
          type: str
          default: example
          constraints:
            - type: max length
              length: 20
      opt-file:
        name: Optional files
        description: An optional multi-file parameter.
        type: optional
        parameter:
          cli: --opt-files
          type: file
          multiple: true
  - name: Multi-value parameters
    operations:
      - first-op
      - second-op
    parameters:
      int-int-int:
        name: Three integers
        description: A parameter with three integer values.
        cli: -3i
        type: multi
        parameters:
          - name: First integer
            type: int
            default: 0
          - name: Second integer
            type: int
            default: 0
            constraints:
              - type: interval
                min: 0
                max: 10
          - name: Third integer
            type: int
            default: 0
            constraints:
              - type: interval
                min: 0
      bool-float-file-enum:
        name: Mixed parameter
        description: A parameter with four values.
        cli: "-4"
        type: multi
        parameters:
          - name: The bool
            type: bool
            default: true
          - name: The float
            description: null
            type: float
            default: 1.0
            constraints:
              - type: interval
                min: 0.0
          - name: The file
            type: file
            formats:
              - .ms
              - .vcf
          - name: The enum
            description: Choose one.
            type: enum
            default: 1
            options:
                - name: Option 0
                - name: Option 1
                - name: Option 2
  - name: Nested parameters
    operations:
      - first-op
    parameters:
      opt-multi:
        name: Optional multi-value
        description: An optional parameter with two values.
        type: optional
        default: true
        parameter:
          name: null
          description: The inner, multi-value parameter.
          type: multi
          parameters:
            - name: A float
              type: float
              default: 0.99
              constraints:
                - type: interval
                  min: 0.0
                  max: 1.0
            - name: A string
              description: Type anything.
              type: str
      multi-opt:
        name: Multiple optionals
        description: A multi parameter where some are optional.
        type: multi
        parameters:
          - type: optional
            default: false
            parameter:
              type: int
              default: 6
          - description: This float is required.
            type: float
            default: 2.5
            constraints:
              - type: interval
                max: 2.5
          - name: Another float?
            type: optional
            default: true
            parameter:
              name: The second float
              type: float
              default: 100.8